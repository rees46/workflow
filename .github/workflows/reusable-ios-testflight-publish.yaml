name: Reusable iOS TestFlight Publish

on:
  workflow_call:
    inputs:
      app_identifier:
        required: true
        type: string
      ipa_file:
        required: true
        type: string
      PROPERTIES_FILE:
        required: true
        type: string
      xcworkspace:
        required: true
        type: string
      scheme:
        required: true
        type: string
      export_options_plist:
        required: true
        type: string
    secrets:
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY:
        required: true
      GITHUB_APP_ID:
        required: true
      GITHUB_APP_PRIVATE_KEY:
        required: true
      IOS_CERTIFICATE_P12:
        required: true
      IOS_CERTIFICATE_PASSWORD:
        required: true
      IOS_PROVISIONING_PROFILE:
        required: true

jobs:
  publish_and_version_bump:
    runs-on: macos-latest

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # token: ${{ steps.app-token.outputs.token }}

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate and provisioning profile from secrets
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # - name: Debug schemes
      #   run: |
      #     xcrun xcodebuild \
      #       -list

      - name: Pod install
        run: |
          pod cache clean --all
          rm -rf Pods
          rm Podfile.lock
          pod install

      # - name: Check required repo files
      #   run: |
      #     if [ ! -f "${{ inputs.xcworkspace }}" ]; then
      #       echo "Workspace file not found!"
      #       exit 1
      #     fi
      #
      #     if [ ! -f "${{ inputs.export_options_plist }}" ]; then
      #       echo "ExportOptions.plist file not found!"
      #       exit 1
      #     fi

      - name: Build and Archive
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          xcrun xcodebuild \
            -workspace ${{ inputs.xcworkspace }} \
            -scheme ${{ inputs.scheme }} \
            -configuration AppStoreDistribution \
            -sdk iphoneos \
            -parallelizeTargets \
            -showBuildTimingSummary \
            -disableAutomaticPackageResolution \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            # CODE_SIGN_IDENTITY=demo-ios \
            PROVISIONING_PROFILE_SPECIFIER=demo-ios

          xcrun xcodebuild \
            -exportArchive \
            -exportOptionsPlist ${{ inputs.export_options_plist }} \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build

      - name: Upload to TestFlight
        uses: Apple-Actions/upload-testflight-build@master
        with:
          app-path: ${{ inputs.ipa_file }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          # api-private-key: ${{ steps.decode-key-step.outputs.decoded_key }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      # Increment version
      - name: Bump version
        run: ./increment_version.sh
        env:
          PROPERTIES_FILE: ${{ inputs.PROPERTIES_FILE }}

      # Retrieve new version
      - name: Retrieve new version
        id: versionName
        run: |
          if [ ! -f "${{ inputs.PROPERTIES_FILE }}" ]; then
            echo "Properties file not found!"
            exit 1
          fi

          version=$(grep "VERSION_NAME=" ${{ inputs.PROPERTIES_FILE }} | cut -d'=' -f2)
          if [ -z "$version" ]; then
            echo "Version not found in properties file!"
            exit 1
          fi

          echo "versionName=$version" >> $GITHUB_ENV
          echo "versionName=$version" >> $GITHUB_OUTPUT

      # Commit version changes
      - name: Commit version changes
        id: committer
        uses: planetscale/ghcommit-action@v0.1.6
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          repo: ${{ github.repository }}
          branch: master
          commit_message: "chore: bump version to ${{ steps.versionName.outputs.versionName }}"
          file_pattern: ${{ inputs.PROPERTIES_FILE }}
