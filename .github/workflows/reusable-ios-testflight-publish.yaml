name: Reusable iOS TestFlight Publish

on:
  workflow_call:
    inputs:
      app_identifier:
        required: true
        type: string
      ipa_file:
        required: true
        type: string
      PROPERTIES_FILE:
        required: true
        type: string
      xcworkspace:
        required: true
        type: string
      scheme:
        required: true
        type: string
      export_options_plist:
        required: true
        type: string
    secrets:
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY:
        required: true
      GITHUB_APP_ID:
        required: true
      GITHUB_APP_PRIVATE_KEY:
        required: true
      IOS_CERTIFICATE_P12:
        required: true
      IOS_CERTIFICATE_PASSWORD:
        required: true
      IOS_PROVISIONING_PROFILE:
        required: true

jobs:
  publish_and_version_bump:
    runs-on: macos-latest

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      # Create and set up keychain
      - name: Set up Keychain
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -l ~/Library/Keychains/build.keychain

      - name: Prepare AuthKey directory
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Set permissions for AuthKey
        run: chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Authenticate with App Store Connect API Key
        run: |
          xcrun altool --list-providers \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$ISSUER_ID"
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # Import the .p12 certificate
      - name: Import iOS certificate (.p12)
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "${{ secrets.IOS_CERTIFICATE_P12 }}" | base64 --decode > ios_certificate.p12
          security import ios_certificate.p12 -k ~/Library/Keychains/build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign

      # Install the provisioning profile
      - name: Install provisioning profile
        id: install_profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision
          uuid=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< $(security cms -D -i profile.mobileprovision))
          mv profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${uuid}.mobileprovision
          echo "UUID=${uuid}" >> $GITHUB_ENV

      # Pod install
      - name: Pod install
        run: |
          pod cache clean --all
          rm -rf Pods
          rm Podfile.lock
          pod install

      # Build IPA
      - name: Build IPA
        run: |
          if [ ! -f "${{ inputs.xcworkspace }}" ] && [ ! -d "${{ inputs.xcworkspace }}" ]; then
            echo "Workspace file not found!"
            exit 1
          fi

          if [ ! -f "${{ inputs.export_options_plist }}" ] && [ ! -d "${{ inputs.export_options_plist }}" ]; then
            echo "ExportOptions.plist file not found!"
            exit 1
          fi

          xcodebuild -workspace ${{ inputs.xcworkspace }} \
            -scheme ${{ inputs.scheme }} \
            -sdk iphoneos \
            -configuration AppStoreDistribution \
            -allowProvisioningUpdates \
            -archivePath $PWD/build/App.xcarchive \
            CODE_SIGN_IDENTITY="Apple Development"

          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist ${{ inputs.export_options_plist }} \
            -allowProvisioningUpdates

      # Upload IPA build to TestFlight
      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          if [ ! -f "${{ inputs.ipa_file }}" ]; then
            echo "IPA file not found!"
            exit 1
          fi

          xcrun altool --list-providers \
            --apiKey $API_KEY_ID \
            --apiIssuer $ISSUER_ID

      # Increment version
      - name: Bump version
        run: ./increment_version.sh
        env:
          PROPERTIES_FILE: ${{ inputs.PROPERTIES_FILE }}

      # Retrieve new version
      - name: Retrieve new version
        id: versionName
        run: |
          if [ ! -f "${{ inputs.PROPERTIES_FILE }}" ]; then
            echo "Properties file not found!"
            exit 1
          fi

          version=$(grep "VERSION_NAME=" ${{ inputs.PROPERTIES_FILE }} | cut -d'=' -f2)
          if [ -z "$version" ]; then
            echo "Version not found in properties file!"
            exit 1
          fi

          echo "versionName=$version" >> $GITHUB_ENV
          echo "versionName=$version" >> $GITHUB_OUTPUT

      # Commit version changes
      - name: Commit version changes
        id: committer
        uses: planetscale/ghcommit-action@v0.1.6
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          repo: ${{ github.repository }}
          branch: master
          commit_message: "chore: bump version to ${{ steps.versionName.outputs.versionName }}"
          file_pattern: ${{ inputs.PROPERTIES_FILE }}
