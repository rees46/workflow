name: Reusable iOS TestFlight Publish

on:
  workflow_call:
    inputs:
      app_identifier:
        required: true
        type: string
      ipa_file:
        required: true
        type: string
      PROPERTIES_FILE:
        required: true
        type: string
      xcworkspace:
        required: true
        type: string
      scheme:
        required: true
        type: string
      export_options_plist:
        required: true
        type: string
    secrets:
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY:
        required: true
      GITHUB_APP_ID:
        required: true
      GITHUB_APP_PRIVATE_KEY:
        required: true

jobs:
  publish_and_version_bump:
    runs-on: macos-latest

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.GITHUB_APP_ID }}
          private-key: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      # Decode App Store Connect API Key
      - name: Decode App Store Connect API Key
        id: decode
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" | base64 --decode > AuthKey.p8

      - name: Move AuthKey to expected location
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          mv AuthKey.p8 ~/.appstoreconnect/private_keys/

      - name: Fix permissions for AuthKey.p8
        run: |
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey.p8

      - name: Debug Check AuthKey.p8
        run: |
          ls -l ~/.appstoreconnect/private_keys/AuthKey.p8

      - name: Authenticate with Apple Developer Portal
        run: |
          xcrun altool --list-providers \
          --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
          --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          # TODO fix it
          --key /Users/runner/.appstoreconnect/private_keys/AuthKey.p8

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Check Installed Provisioning Profiles
        run: |
          security find-identity -v -p codesigning
          ls -al ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Clean CocoaPods cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf ~/Library/Caches/CocoaPods
          rm -rf Pods
          rm -rf Podfile.lock
          pod install --repo-update

      - name: Build IPA
        run: |
          if [ ! -f "${{ inputs.xcworkspace }}" ] && [ ! -d "${{ inputs.xcworkspace }}" ]; then
            echo "Workspace file not found!"
            exit 1
          fi

          if [ ! -f "${{ inputs.export_options_plist }}" ] && [ ! -d "${{ inputs.export_options_plist }}" ]; then
            echo "ExportOptions.plist file not found!"
            exit 1
          fi

          xcodebuild -workspace ${{ inputs.xcworkspace }} \
            -scheme ${{ inputs.scheme }} \
            -sdk iphoneos \
            -configuration AppStoreDistribution \
            -allowProvisioningUpdates \
            archive -archivePath $PWD/build/App.xcarchive

          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportPath $PWD/build \
            -exportOptionsPlist ${{ inputs.export_options_plist }} \
            -allowProvisioningUpdates

      # Upload IPA build to TestFlight
      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          if [ ! -f "${{ inputs.ipa_file }}" ]; then
            echo "IPA file not found!"
            exit 1
          fi

          xcrun altool --list-providers \
          --apiKey $API_KEY_ID \
          --apiIssuer $ISSUER_ID \
          --key ~/.appstoreconnect/private_keys/AuthKey.p8

      # Increment version
      - name: Bump version
        run: ./increment_version.sh
        env:
          PROPERTIES_FILE: ${{ inputs.PROPERTIES_FILE }}

      # Retrieve new version
      - name: Retrieve new version
        id: versionName
        run: |
          if [ ! -f "${{ inputs.PROPERTIES_FILE }}" ]; then
            echo "Properties file not found!"
            exit 1
          fi

          version=$(grep "VERSION_NAME=" ${{ inputs.PROPERTIES_FILE }} | cut -d'=' -f2)
          if [ -z "$version" ]; then
            echo "Version not found in properties file!"
            exit 1
          fi

          echo "versionName=$version" >> $GITHUB_ENV
          echo "versionName=$version" >> $GITHUB_OUTPUT

      # Commit version changes
      - name: Commit version changes
        id: committer
        uses: planetscale/ghcommit-action@v0.1.6
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          repo: ${{ github.repository }}
          branch: master
          commit_message: "chore: bump version to ${{ steps.versionName.outputs.versionName }}"
          file_pattern: ${{ inputs.PROPERTIES_FILE }}
