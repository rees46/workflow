name: Create pull request on target repo
description: create pull request on target repo

inputs:
  targetDirectory:
    default: tmp/target
    description: Commit author GitHub token
    required: true
  githubToken:
    description: GitHub token
    required: true
  prTitle:
    description: PullRequest title
    default: Automated release
    required: false
  prBody:
    description: PullRequest body
    default: This is an automated pull request
    required: false
  reviewerUsername:
    description: PullRequest reviewer username
    default: Xyzcancer
    required: true
  lastPrAuthor:
    description: PullRequest reviewer username
    default: Xyzcancer
    required: true
  commitMessage:
    default: 'feat: automated commit'
    description: commit message
    required: false
  branchName:
    description: git branch name
    required: true
  targetRepository:
    description: pull request target repository
    required: false

runs:
  using: composite

  steps:
    - shell: bash
      run: |
        sudo chmod -R ugo+rwX .

    # Resolve the PR base from the destination repo's default branch so it
    # follows whatever that repo uses (main or master), not the source ref.
    # Falls back to the current repository when targetRepository is empty
    # (e.g. the in-repo release version-bump flow).
    - name: Resolve PR base branch
      id: baseBranch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.githubToken }}
      run: |
        repo="${{ inputs.targetRepository }}"
        [ -z "$repo" ] && repo="${{ github.repository }}"
        base="$(gh api "repos/$repo" --jq '.default_branch')"
        echo "Base branch for $repo: $base"
        echo "base=$base" >> "$GITHUB_OUTPUT"

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      id: cpr
      with:
        path: ${{ inputs.targetDirectory || '.' }}
        branch: ${{ inputs.branchName }}
        commit-message: ${{ inputs.commitMessage }}
        sign-commits: true
        delete-branch: true
        draft: false
        token: ${{ inputs.githubToken }}
        title: ${{ inputs.prTitle }}
        body: ${{ inputs.prBody }}
        base: ${{ steps.baseBranch.outputs.base }}
        assignees: ${{ inputs.lastPrAuthor || inputs.reviewerUsername }}
        reviewers: ${{ inputs.reviewerUsername }}

    - name: Enable Pull Request Automerge
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.githubToken }}
        PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
      run: gh pr merge --squash --admin "$PR_NUMBER"
